<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTO Preflop Trener & Oppslagsverk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <header>
            <h1>Preflop Pro (Turneringsutgave)</h1>
            
            <button id="btn-open-cheat-sheet" class="primary-btn">📖 ÅPNE LIVE OPPSLAGSVERK</button>
            
            <div id="game-stats">
                <div class="stat-box">Poeng: <span id="score-display">0</span></div>
                <div class="stat-box">Streak: <span id="streak-display">0</span> 🔥</div>
            </div>

            <div id="settings-panel">
                <div class="setting-group">
                    <label for="stack-size-selector">Stack:</label>
                    <select id="stack-size-selector">
                        <option value="100">Deep Stack (100BB+)</option>
                        <option value="40" selected>Normal (40BB)</option>
                        <option value="15">Short Stack (15BB - Push/Fold)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="table-size-selector">Bordstørrelse:</label>
                    <select id="table-size-selector">
                        <option value="9">9-Max (Full Ring)</option>
                        <option value="8">8-Max</option>
                        <option value="6">6-Max</option>
                        <option value="3">3-Max</option>
                        <option value="2">Heads-Up (2-Max)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="mode-selector">Modus:</label>
                    <select id="mode-selector">
                        <option value="RFI">Åpen Pott (RFI)</option>
                        <option value="FACING_RAISE">Møter en Raise (3-Bet / Syne)</option>
                    </select>
                </div>
                
                <div class="setting-group checkbox-group" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                    <label for="auto-range-toggle" class="toggle-label">
                        <input type="checkbox" id="auto-range-toggle" checked>
                        Vis range automatisk ved feil
                    </label>
                    <label for="focus-mode-toggle" class="toggle-label">
                        <input type="checkbox" id="focus-mode-toggle">
                        Fokusmodus (Fjern åpenbart søppel)
                    </label>
                </div>
            </div>

            <button id="btn-show-range" class="secondary-btn">Vis Range for <span id="range-pos-label">UTG</span></button>
        </header>

        <main id="game-area">
            <div id="poker-table"></div>
            
            <div id="seat-utg" class="seat">UTG</div>
            <div id="seat-utg1" class="seat">UTG1</div>
            <div id="seat-utg2" class="seat">UTG2</div>
            <div id="seat-lj" class="seat">LJ</div>
            <div id="seat-hj" class="seat">HJ</div>
            <div id="seat-co" class="seat">CO</div>
            <div id="seat-btn" class="seat">BTN</div>
            <div id="seat-sb" class="seat">SB</div>
            <div id="seat-bb" class="seat">BB</div>

            <div id="center-info">
                <div id="scenario-display">Åpen Pott (Ingen har høynet)</div>
                <div id="current-pos-display">UTG</div>
                <div id="hole-cards">
                    </div>
            </div>
        </main>

        <section id="controls">
            <button id="btn-fold" class="action-btn fold-btn">FOLD</button>
            <button id="btn-call" class="action-btn call-btn">LIMP / CHECK</button>
            <button id="btn-raise" class="action-btn raise-btn">RAISE</button>
        </section>

        <section id="feedback-section" class="hidden">
            <div id="feedback-content">
                <h2 id="feedback-title">Resultat</h2>
                <p id="feedback-text">Forklaringen kommer her...</p>
                <div id="feedback-context" class="context-box hidden">
                    </div>
            </div>
            <button id="btn-next" class="next-btn">NESTE HÅND</button>
        </section>
    </div>

    <div id="range-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Treningsrange: <span id="modal-pos-title">UTG</span></h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div id="matrix-container" class="matrix-grid"></div>
            <div class="legend" id="modal-legend">
                <div class="legend-item"><span class="color-box raise-color"></span> Raise / 3-Bet / Push</div>
                <div class="legend-item"><span class="color-box call-color"></span> Call (Flat)</div>
                <div class="legend-item"><span class="color-box fold-color"></span> Fold</div>
            </div>
        </div>
    </div>

    <div id="cheat-sheet-modal" class="hidden">
        <div class="modal-content cheat-sheet-content">
            <div class="modal-header" style="border-bottom: 2px solid var(--gold);">
                <h2 style="color: var(--gold);">📖 GTO Live Oppslagsverk</h2>
                <button id="close-cheat-sheet" class="close-btn">&times;</button>
            </div>
            
            <div class="cheat-sheet-controls">
                <select id="cs-stack-selector" class="cs-select">
                    <option value="100">100BB (Deep)</option>
                    <option value="40" selected>40BB (Normal)</option>
                    <option value="15">15BB (Push/Fold)</option>
                </select>
                <select id="cs-table-selector" class="cs-select">
                    <option value="9">9-Max</option>
                    <option value="8">8-Max</option>
                    <option value="6">6-Max</option>
                    <option value="3">3-Max</option>
                    <option value="2">Heads-Up</option>
                </select>
                <select id="cs-pos-selector" class="cs-select">
                    </select>
                <select id="cs-mode-selector" class="cs-select">
                    <option value="RFI">Åpen Pott (RFI)</option>
                    <option value="FACING_RAISE">Møter en Raise</option>
                </select>
            </div>

            <div id="cs-matrix-container" class="matrix-grid"></div>
            
            <div class="legend">
                <div class="legend-item"><span class="color-box raise-color"></span> Spilles Aggressivt</div>
                <div class="legend-item"><span class="color-box call-color"></span> Spilles Passivt (Call)</div>
                <div class="legend-item"><span class="color-box fold-color"></span> Fold</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
